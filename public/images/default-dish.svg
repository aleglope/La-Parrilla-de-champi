<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d3d3d"/>
      <stop offset="100%" style="stop-color:#2a2a2a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- Plate -->
  <ellipse cx="400" cy="320" rx="180" ry="40" fill="#1a1a1a" opacity="0.5"/>
  <ellipse cx="400" cy="300" rx="160" ry="100" fill="url(#plateGrad)" stroke="#4a4a4a" stroke-width="2"/>
  <ellipse cx="400" cy="290" rx="130" ry="80" fill="#2d2d2d" stroke="#3a3a3a" stroke-width="1"/>
  
  <!-- Fork icon -->
  <g transform="translate(300, 200)" fill="#C01F19" opacity="0.6">
    <rect x="0" y="0" width="4" height="60" rx="2"/>
    <rect x="10" y="0" width="4" height="60" rx="2"/>
    <rect x="20" y="0" width="4" height="60" rx="2"/>
    <rect x="30" y="0" width="4" height="60" rx="2"/>
    <rect x="-2" y="55" width="38" height="8" rx="2"/>
    <rect x="14" y="60" width="8" height="40" rx="2"/>
  </g>
  
  <!-- Knife icon -->
  <g transform="translate(460, 200)" fill="#1789C0" opacity="0.6">
    <path d="M0,0 L20,0 L25,70 L15,100 L10,100 L10,70 L0,0 Z"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="450" text-anchor="middle" fill="#666" font-family="system-ui, sans-serif" font-size="18" letter-spacing="0.2em">
    IMAGEN NO DISPONIBLE
  </text>
</svg>

